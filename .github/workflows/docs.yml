name: Docs

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'src/ui/modules/core/**'
      - 'src/ui/modules/pages/homepage/sections/**'
      - 'src/ui/styles/**'
      - 'src/ui/utils/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/docs.yml'
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'src/ui/modules/core/**'
      - 'src/ui/modules/pages/homepage/sections/**'
      - 'src/ui/styles/**'
      - 'src/ui/utils/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm
      # Unfiltered: the docs site imports app sources via the @ui alias, whose
      # bare imports (react-use-measure, motion...) resolve from the ROOT
      # node_modules — a --filter install would leave them missing.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm --filter forever-pto-docs lint
      - name: Typecheck
        run: pnpm --filter forever-pto-docs check
      - name: Build
        run: pnpm --filter forever-pto-docs build
      - name: Install Playwright browsers
        run: pnpm --filter forever-pto-docs exec playwright install --with-deps chromium
      - name: Smoke tests
        run: pnpm --filter forever-pto-docs test:e2e
      - name: Upload Playwright report
        if: ${{ failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: docs-playwright-report
          path: docs/playwright-report/
          retention-days: 7
      - name: Upload site
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: docs-dist
          path: docs/dist/
          retention-days: 1

  preview:
    name: Preview
    if: github.event_name == 'pull_request'
    needs: [build]
    runs-on: ubuntu-latest
    environment: development
    permissions:
      contents: read
      pull-requests: write
    env:
      PREVIEW_MARKER: '<!-- docs-preview -->'
      PREVIEW_URL: https://pr-${{ github.event.pull_request.number }}-forever-pto-docs.fbuireu.workers.dev
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Download site
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: docs-dist
          path: docs/dist
      - name: Upload preview version
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: docs
          wranglerVersion: '4.107.1'
          command: versions upload --preview-alias pr-${{ github.event.pull_request.number }}
      - name: Find existing comment
        uses: peter-evans/find-comment@b30e6a3c0ed37e7c023ccd3f1db5c6c0b0c23aad # v4.0.0
        id: find-comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: ${{ env.PREVIEW_MARKER }}
      - name: Upsert preview comment
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          edit-mode: replace
          body: |
            ${{ env.PREVIEW_MARKER }}
            ### Docs preview

            | | |
            |---|---|
            | **URL** | ${{ env.PREVIEW_URL }} |
            | **Branch** | `${{ github.head_ref }}` |
            | **Commit** | `${{ github.event.pull_request.head.sha }}` |

  deploy:
    name: Deploy
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: [build]
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://docs.forever-pto.com
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Download site
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: docs-dist
          path: docs/dist
      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: docs
          wranglerVersion: '4.107.1'
          command: deploy
