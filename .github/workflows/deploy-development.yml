name: Deploy - Development

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: deploy-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    uses: ./.github/workflows/_deploy.yml
    with:
      environment: development
      wrangler_env: development
      worker_name: pr-${{ github.event.pull_request.number }}-forever-pto-development
      url: https://pr-${{ github.event.pull_request.number }}-forever-pto-development.fbuireu.workers.dev
    secrets: inherit

  comment:
    name: Post preview URL
    needs: [deploy]
    runs-on: ubuntu-latest
    env:
      PREVIEW_MARKER: '<!-- preview-deployment -->'
    steps:
      - name: Find existing comment
        uses: peter-evans/find-comment@v4
        id: find-comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: ${{ env.PREVIEW_MARKER }}

      - name: Upsert preview comment
        uses: peter-evans/create-or-update-comment@v5
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          edit-mode: replace
          body: |
            ${{ env.PREVIEW_MARKER }}
            ### Preview deployment

            | | |
            |---|---|
            | **URL** | https://pr-${{ github.event.pull_request.number }}-forever-pto-development.fbuireu.workers.dev |
            | **Branch** | `${{ github.head_ref }}` |
            | **Commit** | `${{ github.event.pull_request.head.sha }}` |

  e2e:
    name: E2E tests
    needs: [deploy]
    runs-on: ubuntu-latest
    environment: development
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: Run E2E tests
        run: pnpm test:e2e
        env:
          BASE_URL: https://pr-${{ github.event.pull_request.number }}-forever-pto-development.fbuireu.workers.dev
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
