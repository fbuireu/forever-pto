name: Deploy - Preview

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: deploy-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy:
    uses: ./.github/workflows/_deploy.yml
    with:
      environment: development
      wrangler_env: development
      worker_name: forever-pto-pr-${{ github.event.pull_request.number }}
      url: https://forever-pto-pr-${{ github.event.pull_request.number }}.ferran-buireu.workers.dev
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  comment:
    name: Post preview URL
    needs: [deploy]
    runs-on: ubuntu-latest
    steps:
      - name: Find existing comment
        uses: peter-evans/find-comment@v4
        id: find-comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: '<!-- preview-deployment -->'

      - name: Upsert preview comment
        uses: peter-evans/create-or-update-comment@v5
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          edit-mode: replace
          body: |
            <!-- preview-deployment -->
            ### Preview deployment

            | | |
            |---|---|
            | **URL** | https://forever-pto-pr-${{ github.event.pull_request.number }}.ferran-buireu.workers.dev |
            | **Branch** | `${{ github.head_ref }}` |
            | **Commit** | `${{ github.event.pull_request.head.sha }}` |

  e2e:
    name: E2E tests
    needs: [deploy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
        env:
          BASE_URL: https://forever-pto-pr-${{ github.event.pull_request.number }}.ferran-buireu.workers.dev
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
