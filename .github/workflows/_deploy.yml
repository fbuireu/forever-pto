name: Deploy (reusable)

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      wrangler_env:
        required: true
        type: string
      url:
        required: false
        type: string
      worker_name:
        required: false
        type: string
        description: Override the worker name (for per-PR preview deployments)
    secrets:
      CLOUDFLARE_API_TOKEN:
        required: true
      CLOUDFLARE_ACCOUNT_ID:
        required: true
      JWT_SECRET:
        required: true
      STRIPE_SECRET_KEY:
        required: true
      STRIPE_WEBHOOK_SECRET:
        required: true
      RESEND_API_KEY:
        required: true
      TURSO_AUTH_TOKEN:
        required: true
permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
      url: ${{ inputs.url }}
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm run cf:build
        env:
          NEXT_PUBLIC_BETTER_STACK_SOURCE_TOKEN: ${{ vars.NEXT_PUBLIC_BETTER_STACK_SOURCE_TOKEN }}
          NEXT_PUBLIC_BETTER_STACK_INGESTING_URL: ${{ vars.NEXT_PUBLIC_BETTER_STACK_INGESTING_URL }}
          NEXT_PUBLIC_BETTER_STACK_TRACKING_TOKEN: ${{ vars.NEXT_PUBLIC_BETTER_STACK_TRACKING_TOKEN }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_GOOGLE_ANALYTICS_ID: ${{ vars.NEXT_PUBLIC_GOOGLE_ANALYTICS_ID }}
          NEXT_PUBLIC_STORAGE_KEY: ${{ vars.NEXT_PUBLIC_STORAGE_KEY }}
      - name: Deploy to Cloudflare Workers
        env:
          INPUTS_WORKER_NAME: ${{ inputs.worker_name }}
          INPUTS_WRANGLER_ENV: ${{ inputs.wrangler_env }}
        run: |
          NAME_FLAG=""
          if [ -n "${INPUTS_WORKER_NAME}" ]; then
            NAME_FLAG="--name ${INPUTS_WORKER_NAME}"
          fi
          pnpm exec wrangler deploy --env "${INPUTS_WRANGLER_ENV}" $NAME_FLAG
      - name: Set Worker secrets
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          INPUTS_WORKER_NAME: ${{ inputs.worker_name }}
          INPUTS_WRANGLER_ENV: ${{ inputs.wrangler_env }}
        run: |
          if [ -n "${INPUTS_WORKER_NAME}" ]; then
            TARGET_FLAG="--name ${INPUTS_WORKER_NAME}"
          else
            TARGET_FLAG="--env ${INPUTS_WRANGLER_ENV}"
          fi
          node -e "
          const required = ['JWT_SECRET','STRIPE_SECRET_KEY','STRIPE_WEBHOOK_SECRET','RESEND_API_KEY','TURSO_AUTH_TOKEN'];
          const missing = required.filter(k => !process.env[k]);
          if (missing.length) { console.error('Missing required secrets: ' + missing.join(', ')); process.exit(1); }
          process.stdout.write(JSON.stringify(Object.fromEntries(required.map(k => [k, process.env[k]]))));
          " | pnpm exec wrangler secret bulk $TARGET_FLAG
