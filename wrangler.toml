name = "forever-pto"
main = ".open-next/worker.js"
compatibility_date = "2025-11-25"
compatibility_flags = ["nodejs_compat", "enable_nodejs_process_v2"]
keep_names = false

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[observability]
enabled = true

[observability.logs]
invocation_logs = true
head_sampling_rate = 0.2

[observability.traces]
enabled = true
head_sampling_rate = 0.2

[[routes]]
pattern = "forever-pto.com/*"
zone_name = "forever-pto.com"

[[tail_consumers]]
service = "forever-pto-tail"

[placement]
mode = "smart"

[[r2_buckets]]
binding = "NEXT_INC_CACHE_R2_BUCKET"
bucket_name = "next-inc-cache"

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "830b55c22c574287acebb51ca89b01f0"

[vars]
NEXT_PUBLIC_SITE_URL = "https://forever-pto.com"
NEXT_PUBLIC_EMAIL_SELF = "contact@forever-pto.com"
